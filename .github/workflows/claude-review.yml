name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Generate diff
        run: git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.json' > /tmp/diff.txt
      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p --output-format json \
            "You are reviewing a CESA pull request diff. Check ONLY: (1) agentic loop
             correctness (stop_reason, not text/iteration caps); (2) every tool has a
             Zod schema + structured errors; (3) no secrets or real API keys;
             (4) citation/provenance preserved; (5) no medical-advice language.
             Report severity | finding | file:line | suggested fix. Only report issues
             you are confident about; do not speculate. Diff follows:" \
            < /tmp/diff.txt > /tmp/review.json
      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = JSON.parse(fs.readFileSync('/tmp/review.json', 'utf8'));
            const body = out.result || out.content || 'No review output.';
            if (body.trim()) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "## 🤖 Claude Code review\n\n" + body
              });
            }