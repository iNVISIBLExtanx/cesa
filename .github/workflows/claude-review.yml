name: Claude Code Review

# PARKED UNTIL PHASE 7.
#
# CI/CD integration with `claude -p` is a Phase 7 learning objective
# (CCAR-F Domain 3.6). Running it now adds no learning value and distracts from
# the actual work of Phases 1-6.
#
# `workflow_dispatch` means this NEVER runs automatically. It only runs if you
# manually trigger it from the Actions tab. In Phase 7 you will change this back
# to `pull_request` on purpose, as the lesson.
on:
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Check for API key
        run: |
          if [ "${HAS_ANTHROPIC_KEY}" != "true" ]; then
            echo "::notice::ANTHROPIC_API_KEY not set. This job is a no-op."
          fi

      - uses: actions/checkout@v4
        if: env.HAS_ANTHROPIC_KEY == 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: env.HAS_ANTHROPIC_KEY == 'true'
        with:
          node-version: '20'

      - name: Install Claude Code
        if: env.HAS_ANTHROPIC_KEY == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run review
        if: env.HAS_ANTHROPIC_KEY == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Phase 7 will build this out properly. Placeholder for now."
